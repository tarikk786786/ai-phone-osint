services:
  # Backend API (FastAPI)
  - type: web
    name: phone-osint-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: phone-osint-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://phone-osint-frontend.onrender.com
      - key: LOG_LEVEL
        value: INFO

  # Frontend (Next.js)
  - type: web
    name: phone-osint-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://phone-osint-api.onrender.com

databases:
  - name: phone-osint-db
    plan: free
    databaseType: postgres
    ipAllowList: []
